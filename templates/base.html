<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG Eye State Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
        }

        .navbar {
            background-color: #1a1a2e;
        }

        .navbar-brand,
        .nav-link {
            color: white !important;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background-color: #1a1a2e;
            border: none;
        }

        .btn-primary:hover {
            background-color: #16213e;
        }

        .badge-best {
            background-color: #28a745;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🧠 EEG Eye Detector</a>
            <div class="ms-auto">
                {% if user.is_authenticated %}
                <span class="nav-link d-inline">👤 {{ user.username }}</span>
                <a class="nav-link d-inline" href="{% url 'logout' %}">Logout</a>
                {% else %}
                <a class="nav-link d-inline" href="{% url 'login' %}">Login</a>
                <a class="nav-link d-inline" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
